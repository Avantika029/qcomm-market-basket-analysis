<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Q-Comm Market Basket Analysis - System Architecture</title>
<desc>Instacart data flows through DuckDB into MBA rules and embedding models, which combine into a recommender engine. The recommender engine feeds a FastAPI service powering a Streamlit dashboard, and CSV exports powering a Power BI executive dashboard.</desc>
